name: Generate Datas

on:
  schedule: # Se ejecuta automáticamente cada 12 horas
    - cron: "0 */12 * * *"
  workflow_dispatch: # Te permite ejecutarlo manualmente cuando quieras

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    steps:
      # Genera el juego de la serpiente con tus contribuciones
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk@v3
        with:
          github_user_name: omarapp19
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Sube los archivos generados a una rama invisible llamada "output"
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
